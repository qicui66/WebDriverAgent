name: Build Custom WDA IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Inject saveImageToCameraRoll API
        run: python3 scripts/inject.py

      - name: Build WDA
        run: >
          xcodebuild clean build-for-testing
          -project WebDriverAgent.xcodeproj
          -derivedDataPath /tmp/wda-build
          -scheme WebDriverAgentRunner
          -destination "generic/platform=iOS"
          CODE_SIGNING_ALLOWED=NO ARCHS=arm64

      - name: Package IPA
        run: |
          cd /tmp/wda-build/Build/Products/Debug-iphoneos
          APP=$(find . -maxdepth 1 -name "*.app" -type d | head -1)
          [ -z "$APP" ] && ls -la && exit 1
          echo "Found: $APP"
          mkdir -p Payload && cp -r "$APP" Payload/
          zip -r WDA-custom.ipa Payload/ \
            -x "Payload/*/Frameworks/XC*.framework*" \
               "Payload/*/Frameworks/Testing.framework*" \
               "Payload/*/Frameworks/libXCTestSwiftSupport.dylib"
          cp WDA-custom.ipa $GITHUB_WORKSPACE/

      - uses: actions/upload-artifact@v4
        with:
          name: WDA-custom-ipa
          path: WDA-custom.ipa
          retention-days: 7
          if-no-files-found: error
